name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: test sandboxes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install capsule-run (PyPI)
        run: pip install capsule-run

      - name: Build python_sandbox.wasm
        run: |
          mkdir -p smolagents_capsule/sandboxes
          capsule build src/sandbox_py.py --export
          mv src/sandbox_py.wasm smolagents_capsule/sandboxes/sandbox_py.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install @capsule-run/cli (npm)
        run: npm install -g @capsule-run/cli

      - name: Setup package.json for SDK
        run: |
          echo '{"type": "module"}' > package.json
          npm install @capsule-run/sdk

      - name: Build js_sandbox.wasm
        run: |
          capsule build src/sandbox_js.ts --export
          mv src/sandbox_js.wasm smolagents_capsule/sandboxes/sandbox_js.wasm

      - name: Upload wasm sandboxes
        uses: actions/upload-artifact@v4
        with:
          name: wasm-sandboxes
          path: smolagents_capsule/sandboxes/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
